    MedicalParameter:
      type: object
      properties:
        parameterId:
          type: string
        parameterCode:
          type: string
        parameterName:
          type: string
        parameterValue:
          type: string
        parameterType:
          type: string
        parameterDate:
          type: string
          format: date
        parameterTestId:
          type: string
        unit:
