openapi: 3.0.3
info:
  title: Diagnostyka Mobile API
  description: |
    Reverse-engineered API specification for the Diagnostyka mobile app (pl.diagnostyka.mobile v2.0.7).

    This is a Flutter app that uses Firebase Auth for authentication and communicates with a custom backend.

    **Backend hosts:**
    - Production: `https://mobile-fir-backend.diag.pl`
    - Production (alt): `https://mobile-fir-backend.diagnostyka.pl`
    - Staging: `https://mobile-fir-backend-staging.diag.pl`
    - Staging (alt): `https://mobile-fir-backend-staging.diagnostyka.pl`

    **Authentication:** Firebase Auth (phone number + SMS OTP), then Bearer token in Authorization header.
    Additional verification via mObywatel or MojeID for identity confirmation.

    **External services:**
    - LabPlus adapter: `https://api.adapter.labplus.pl`
    - LabPlus LTC: `https://ltc.labplus.pl`
    - Sentry: `https://464c8af78dc8eceb4d953552f53b9c3f@o107039.ingest.us.sentry.io/4508760361271296`
    - Results portal: `https://wyniki.diag.pl/`
    - E-shop: `https://diag.pl/sklep/`
    - Payment redirect: `https://diag.pl/pay-redirect` (PayU gateway, TWISTO buy-now-pay-later)
    - Firebase Dynamic Links: `diaglogin.page.link`, `apps-for-dia.web.app`, `apps-for-dia.firebaseapp.com`
    - MojeID (KIR): `in-eidmock.kir.pl` (cleartext allowed for testing)
    - Facebook App ID: `660569650449530`

    **App type:** Flutter (Dart compiled to libapp.so)
    **HTTP client:** Dio
    **Real-time:** Socket.IO (`/api/socket.io`)
    **Auth headers:** `Authorization: Bearer <token>` + `X-API-KEY` header

    **JSON serialization:** Mixed camelCase/snake_case conventions.
    Some confirmed snake_case keys: `test_performed_date`, `checkout_summary`,
    `start_timestamp`, `coupon_name`, `country_code`, `facility_name`.
    Most fields use camelCase (e.g. `firstName`, `phoneNumber`, `orderStatus`).

    **SSL Certificate Pinning:**
    - Backend cert: `assets/certs/backend_prod_02_2027.cert` (valid 2026-02-17 to 2027-02-17, Certum OV TLS G2 R3)

    **Firebase Configuration:**
    - Project ID: `apps-for-dia`
    - API Key: `AIzaSyBIIQT2arhhBulESRS7ZPl3vQQ8zwU0w_Y`
    - App ID: `1:51520291417:android:4420898509a99339516748`
    - GCM Sender ID: `51520291417`
    - Storage Bucket: `apps-for-dia.appspot.com`
    - Web Client ID: `51520291417-lm2ngfekavnrk6lm0q7g3ij8u12fdtlu.apps.googleusercontent.com`
    - Crashlytics Mapping ID: `3667d92a7ead4ffc962777396429b132`
  version: 2.0.7
  contact:
    name: Diagnostyka
    url: https://diag.pl

servers:
  - url: https://mobile-fir-backend.diag.pl
    description: Production
  - url: https://mobile-fir-backend-staging.diag.pl
    description: Staging

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Firebase Auth ID token
    apiKey:
      type: apiKey
      in: header
      name: X-API-KEY
      description: API key (used alongside Bearer token)

  schemas:
    # ===== Common =====
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        errorId:
          type: string
        errorCode:
          type: string
        errorMessage:
          type: string
        message:
          type: string
        statusCode:
          type: integer

    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer

    # ===== User / Auth =====
    UserModel:
      type: object
      properties:
        id:
          type: string
        userType:
          type: string
          enum: [PATIENT, GUEST, PRACTITIONER, DOCTOR, ADMIN]
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        pesel:
          type: string
          description: Polish national ID number (11 digits)
        gender:
          type: string
        dateOfBirth:
          type: string
          format: date
        version:
          type: string
        status:
          type: string

    SignInResponse:
      type: object
      properties:
        token:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        idToken:
          type: string
          description: Firebase ID token

    LanguageChangeRequest:
      type: object
      properties:
        language:
          type: string
          description: Language code (e.g. "pl", "en", "fr")

    # ===== Verification =====
    VerificationStatusResponse:
      type: object
      properties:
        isVerified:
          type: boolean

    MObywatelVerificationResponse:
      type: object
      properties:
        qrCode:
          type: string
          description: QR code data for mObywatel app
        code:
          type: string
          description: 6-digit verification code

    PatientResponse:
      type: object
      properties:
        token:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        pesel:
          type: string
        gender:
          type: string

    # ===== Consent =====
    ConsentDto:
      type: object
      properties:
        id:
          type: string
        consentStatus:
          $ref: '#/components/schemas/ConsentStatus'
        consentType:
          $ref: '#/components/schemas/ConsentType'
        version:
          type: string
        description:
          type: string

    ConsentRequestDto:
      type: object
      properties:
        id:
          type: string
        consentStatus:
          $ref: '#/components/schemas/ConsentStatus'

    ConsentRequestWrapperDto:
      type: object
      properties:
        consents:
          type: array
          items:
            $ref: '#/components/schemas/ConsentRequestDto'

    ConsentStatus:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED, EXPIRED, REVOKED, APPROVED, WITHDRAWN]

    ConsentType:
      type: string
      enum: [MARKETING, ANALYTICS, PERFORMANCE, FUNCTIONAL, NECESSARY]

    # ===== Patient =====
    PatientModel:
      type: object
      properties:
        patientId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        pesel:
          type: string
        gender:
          type: string
        dateOfBirth:
          type: string
          format: date
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        phones:
          type: array
          items:
            type: string
        emails:
          type: array
          items:
            type: string

    Address:
      type: object
      properties:
        street:
          type: string
        streetType:
          type: string
        houseNumber:
          type: string
        flatNumber:
          type: string
        city:
          type: string
        cityName:
          type: string
        zipCode:
          type: string
        postalCode:
          type: string
        country:
          type: string
        countryCode:
          type: string
        addressLines:
          type: array
          items:
            type: string

    # ===== Health Profile =====
    HealthProfile:
      type: object
      properties:
        bmiProfile:
          type: object
        bmiValue:
          type: number
          format: double
        bmiType:
          type: string
          description: "e.g. underweight, normalWeight, overweight, obesity"
        weightKg:
          type: number
          format: double
        heightCm:
          type: number
          format: double
        waistCircumferenceCm:
          type: number
          format: double
        age:
          type: integer
        gender:
          type: string
        lastUpdated:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # ===== Push Notification =====
    RegisterTokenRequest:
      type: object
      required: [deviceToken, platform]
      properties:
        deviceToken:
          type: string
          description: FCM token
        platform:
          type: string
          enum: [android, ios]

    # ===== CSW (Lab Results) =====
    DocumentModel:
      type: object
      properties:
        documentId:
          type: string
        documentType:
          type: string
        name:
          type: string

    TestResult:
      type: object
      properties:
        testId:
          type: string
        testName:
          type: string
        testNameToScroll:
          type: string
        testCode:
          type: string
        testCodes:
          type: array
          items:
            type: string
        parameterId:
          type: string
        parameterCode:
          type: string
        testValue:
          type: string
        resultValue:
          type: string
        resultTooHigh:
          type: boolean
        resultTooLow:
          type: boolean
        value:
          type: string
        unit:
          type: string
        referenceRange:
          type: string
        referenceRangeInfoTitle:
          type: string
        status:
          type: string
        isVisible:
          type: boolean
        testResultDetailsBarcode:
          type: string
        testResultDetailsDate:
          type: string
          format: date
        testResultDetailsDateOfBirth:
          type: string
          format: date
        testResultDetailsDoctor:
          type: string
        testResultDetailsName:
          type: string
        testResultDetailsOrderNumber:
          type: string
        testResultDetailsOrderedBy:
          type: string
        testResultDetailsPaidBy:
          type: string
        testResultDetailsPesel:
          type: string
        testResultDetailsReceiver:
          type: string
        test_performed_date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderModel:
      type: object
      properties:
        orderId:
          type: string
        orderNumber:
          type: string
        orderDate:
          type: string
          format: date-time
        orderStatus:
          $ref: '#/components/schemas/OrderStatus'
        tests:
          type: array
          items:
            $ref: '#/components/schemas/TestResult'
        items:
          type: array
          items: {}
        totalPrice:
          type: number
          format: double
        totalRegularPrice:
          type: number
          format: double
        totalPriceBeforeDiscount:
          type: number
          format: double
        currency:
          type: string
          example: PLN
        orderedBy:
          $ref: '#/components/schemas/OrdererDataModel'
        orderBarcodes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderStatus:
      type: string
      enum:
        - PendingPayment
        - Completed
        - Realized
        - Overdue
        - CancelledInFacility
        - CancelledInEshop
        - Unknown

    OrdererDataModel:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        pesel:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    # ===== Voucher =====
    VoucherModel:
      type: object
      properties:
        voucherId:
          type: string
        voucherCode:
          type: string
        voucherNumber:
          type: string
        voucherStatus:
          type: string
        voucherName:
          type: string
        voucherSlug:
          type: string
        voucherPrice:
          type: number
          format: double
        voucherCurrency:
          type: string
          example: PLN
        voucherProducts:
          type: array
          items:
            type: object
        voucherTemplates:
          type: array
          items:
            type: object
        voucherCountPakiet:
          type: integer
          description: Count of package vouchers
        voucherCountImep:
          type: integer
          description: Count of individual test vouchers
        expiryDate:
          type: string
          format: date
          description: 90 days from purchase
        orderId:
          type: string
        orderPdfUrl:
          type: string
        voucherPdfUrl:
          type: string
        createdAt:
          type: string
          format: date-time

    # ===== E-Shop =====
    ProductModel:
      type: object
      properties:
        productId:
          type: string
        productName:
          type: string
        productCode:
          type: string
        productType:
          type: string
        productCurrency:
          type: string
          example: PLN
        productPrice:
          type: number
          format: double
        productPrices:
          type: array
          items:
            type: object
        slug:
          type: string
        displayName:
          type: string
        title:
          type: string
        subtitle:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        price:
          type: number
          format: double
        prices:
          type: array
          items:
            type: object
        regularPrice:
          type: number
          format: double
        discountedPrice:
          type: number
          format: double
        basePrice:
          type: number
          format: double
        currency:
          type: string
          example: PLN
        categorySlug:
          type: string
        imageUrl:
          type: string
        iconUrl:
          type: string
        isPackage:
          type: boolean
        isAvailable:
          type: boolean
        isActive:
          type: boolean
        isVisible:
          type: boolean
        isSellable:
          type: boolean
        barcode:
          type: string
        testCode:
          type: string
        testCodes:
          type: array
          items:
            type: string
        elabCode:
          type: string
        elabCodes:
          type: array
          items:
            type: string
        testKind:
          type: string
        kindId:
          type: string
        waitingTime:
          type: string
        preparationDescription:
          type: string
        preparationItems:
          type: array
          items:
            type: string
        testsWithParameters:
          type: array
          items:
            type: object
        testsCount:
          type: integer

    CategoryModel:
      type: object
      properties:
        categoryId:
          type: string
        categoryName:
          type: string
        categoryDescription:
          type: string
        categorySlug:
          type: string
        groupId:
          type: string

    # ===== Cart =====
    CartModel:
      type: object
      properties:
        cartSessionId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalPrice:
          type: number
          format: double
        totalRegularPrice:
          type: number
          format: double
        totalPriceBeforeDiscount:
          type: number
          format: double
        subtotal:
          type: number
          format: double
        discount:
          type: number
          format: double
        discountCode:
          type: string
        totalProducts:
          type: integer
        totalPackages:
          type: integer
        totalSingleTests:
          type: integer
        totalFacilities:
          type: integer
        totalPercentageFill:
          type: number
