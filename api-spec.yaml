          type: number
          format: double
        highValue:
          type: number
          format: double
        normalValue:
          type: number
          format: double

    ProfilaktometrSyncRequest:
      type: object
      properties:
        data:
          type: object
        lastSyncDate:
          type: string
          format: date-time

    # ===== AI Assistant =====
    AssistantSessionResponse:
      type: object
      properties:
        sessionId:
          type: string
        sessionToken:
          type: string
        timestamp:
          type: string
          format: date-time

    AssistantTopic:
      type: object
      properties:
        topicId:
          type: string
        topicName:
          type: string
        title:
          type: string
        description:
          type: string

    AssistantConversationRequest:
      type: object
      properties:
        conversationId:
          type: string
        message:
          type: string
        sessionId:
          type: string

    AssistantConversationResponse:
      type: object
      description: "AiAssistantConversationHttpResponse"
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AssistantMessage'

    AssistantMessage:
      type: object
      properties:
        messageId:
          type: string
        text:
          type: string
        content:
          type: string
        messageType:
          type: string
        messageLevel:
          type: string

    # ===== LabPlus =====
    LabPlusConfig:
      type: object
      description: "Embedded in WebView iframe"
      properties:
        adapterHost:
          type: string
          example: https://api.adapter.labplus.pl
        clientHash:
          type: string
        labplusToken:
          type: string
      externalDocs:
        description: "LabPlus iframe URL pattern: {adapterHost}/interview/{clientHash}?token={token}"
        url: https://api.adapter.labplus.pl

paths:
  # ===== User / Auth =====
  /api/v1/user/sign-in:
    post:
      tags: [Auth]
      summary: Sign in user
      description: Authenticate user after Firebase Auth phone verification. Firebase Auth provides the initial authentication; this endpoint registers/signs in the user on the Diagnostyka backend.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                loginMode:
                  type: string
                  description: "Login method used"
      responses:
        '200':
          description: Successful sign-in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'

  /api/v1/user:
    get:
      tags: [User]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'

  /api/v1/user/language:
    put:
      tags: [User]
      summary: Set user language preference
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LanguageChangeRequest'
      responses:
        '200':
          description: Language updated

  /api/v1/user-storage/{key}:
    get:
      tags: [User]
      summary: Get user storage value
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          examples:
            appReview:
              value: app_review_sent
      responses:
        '200':
          description: Storage value
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  value:
                    type: string
    put:
      tags: [User]
      summary: Set user storage value
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
      responses:
        '200':
          description: Value stored

  # ===== Device =====
  /api/device/verified:
    get:
      tags: [Device]
      summary: Check if device is verified
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatusResponse'

  # ===== Push Notifications =====
  /api/v1/push-notification/register-token:
    post:
      tags: [Notifications]
      summary: Register push notification token (FCM)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTokenRequest'
      responses:
        '200':
          description: Token registered

  # ===== Patient Data =====
  /api/v1/patient-data:
    get:
      tags: [Patient]
      summary: Get patient data
