        On success, returns verified patient data.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                generate6DigitCode:
                  type: boolean
      responses:
        '200':
          description: Verification initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MObywatelVerificationResponse'

  /api/v1/moje-id:
    post:
      tags: [Verification]
      summary: Start MojeID identity verification
      description: |
