        totalFill:
          type: number
          format: double
        collectionFee:
          type: number
          format: double

    CartItem:
      type: object
      properties:
        cartItemId:
          type: string
        itemId:
          type: string
        cartItemPriceId:
          type: string
        priceItemId:
          type: string
        productType:
          $ref: '#/components/schemas/CartProductType'
        quantity:
          type: integer
        price:
          type: number
          format: double
        availableInCart:
          type: boolean
        isUnavailable:
          type: boolean

    CartProductType:
      type: string
      enum: [BLOOD_TEST, PACKAGE, SINGLE_TEST]

    CartAddItemRequest:
      type: object
      properties:
        itemId:
          type: string
        productType:
          $ref: '#/components/schemas/CartProductType'
        quantity:
          type: integer
        priceItemId:
          type: string

    CheckoutRequest:
      type: object
      properties:
        paymentMethod:
          type: string
          description: "PayU or Twisto"
        invoiceNip:
          type: string
          description: NIP (tax ID) for invoice, if requested

    CheckoutResponse:
      type: object
      properties:
        checkoutId:
          type: string
        transactionId:
          type: string
        redirectUrl:
          type: string
          description: PayU payment page URL
        paymentUrl:
          type: string
        paymentStatus:
          type: string
        sessionId:
          type: string
        isPaid:
          type: boolean

    DiscountRequest:
      type: object
      properties:
        discountCode:
          type: string

    DiscountResponse:
      type: object
      properties:
        discountCode:
          type: string
        discountValue:
          type: number
          format: double
        discountProgressMessage:
          type: string

    CartPatientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        pesel:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    # ===== Institution / Facility =====
    FacilityModel:
      type: object
      properties:
        facilityId:
          type: string
        institutionId:
          type: string
        facilityName:
          type: string
        address:
